# netlify.toml — ArduinoAI IDE deployment config

[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Proxy /api/claude → the serverless function
# This means the frontend never needs to know the Netlify function path
[[redirects]]
  from   = "/api/claude"
  to     = "/.netlify/functions/claude-proxy"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "serial=(*)"   # Allow Web Serial API

# Cache built assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Monaco worker files
[[headers]]
  for = "/*.worker.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
